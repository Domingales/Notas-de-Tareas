<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Notas de Tareas</title>
<style>
  :root{
    --azul:#0077ff;
    --rojo:#ff1744;
    --negro:#111;
    --gris:#f5f5f5;
    --gris2:#e9e9e9;
    --texto:#111;
    --tema:#111;
    --tema-suave:#f1f1f1;
    --fondo:#fff;
    --panel:#fff;
    --borde:#111;
    --sombra:0 0 0 rgba(0,0,0,0);
    --radio:0px;
    --fila-hover:#f8f8f8;
    --font-size:12px;
    --row-height:22px;
  }
  body.tema-negro{--tema:#111;--tema-suave:#f1f1f1;--fondo:#fff;--panel:#fff;--borde:#111;--fila-hover:#f4f4f4}
  body.tema-azul{--tema:#006ce0;--tema-suave:#eaf3ff;--fondo:#f8fbff;--panel:#fff;--borde:#004f9f;--fila-hover:#eef6ff}
  body.tema-verde{--tema:#14873d;--tema-suave:#eaf8ef;--fondo:#fbfffc;--panel:#fff;--borde:#106d31;--fila-hover:#eefaf2}
  body.tema-amarillo{--tema:#c18a00;--tema-suave:#fff7df;--fondo:#fffdf7;--panel:#fff;--borde:#8d6500;--fila-hover:#fff8e5}
  body.tema-rojo{--tema:#d61535;--tema-suave:#fff0f3;--fondo:#fffafa;--panel:#fff;--borde:#9f1028;--fila-hover:#fff0f3}
  body.modo-3d{--sombra:3px 3px 0 rgba(0,0,0,.28);--radio:4px}
  body.modo-2d{--sombra:0 0 0 rgba(0,0,0,0);--radio:0px}
  body.densidad-compacta{--font-size:11px;--row-height:19px}
  body.densidad-normal{--font-size:12px;--row-height:22px}
  body.densidad-grande{--font-size:14px;--row-height:27px}
  *{box-sizing:border-box}
  body{
    margin:0;
    padding:8px;
    font-family:Arial, Helvetica, sans-serif;
    font-size:var(--font-size);
    background:var(--fondo);
    color:var(--texto);
  }
  .app{
    width:100%;
    max-width:1180px;
    margin:0 auto;
  }
  .barra-superior{
    display:grid;
    grid-template-columns: 320px 1fr;
    gap:18px;
    align-items:end;
    margin-bottom:6px;
  }
  .bloque-titulo{
    font-weight:bold;
    margin-bottom:3px;
  }
  .filtro-dias-linea{
    display:flex;
    align-items:center;
    gap:8px;
    flex-wrap:nowrap;
  }
  .filtro-dias-label{
    font-weight:bold;
    line-height:1.1;
    white-space:nowrap;
  }
  #diasFiltro{
    width:44px;
    height:24px;
    border:2px solid var(--borde);
    text-align:center;
    font-weight:bold;
    background:var(--panel);
    border-radius:var(--radio);
    box-shadow:var(--sombra);
  }
  .busqueda-box input{
    width:100%;
    height:22px;
    border:2px solid var(--borde);
    padding:2px 6px;
    font-size:var(--font-size);
    background:var(--panel);
    border-radius:var(--radio);
    box-shadow:var(--sombra);
  }
  .herramientas{
    display:flex;
    gap:6px;
    justify-content:flex-end;
    margin:4px 0 6px;
    flex-wrap:wrap;
  }
  button{
    border:1px solid var(--borde);
    background:var(--panel);
    color:#111;
    cursor:pointer;
    font-size:var(--font-size);
    line-height:1;
    padding:4px 6px;
    min-height:22px;
    border-radius:var(--radio);
    box-shadow:var(--sombra);
  }
  button:hover{background:var(--tema-suave)}
  body.modo-3d button:active{transform:translate(2px,2px);box-shadow:1px 1px 0 rgba(0,0,0,.25)}
  .btn-mini{
    border:none;
    background:transparent;
    padding:0 2px;
    min-height:0;
    font-size:17px;
    font-weight:bold;
    vertical-align:middle;
    box-shadow:none;
    border-radius:0;
  }
  .btn-azul{color:var(--azul)}
  .btn-rojo{color:var(--rojo)}
  .btn-add{color:#111;font-size:18px}
  .btn-edit{font-size:15px}
  .btn-del{color:var(--rojo);font-size:15px}
  .btn-sub{color:var(--azul);font-size:16px}
  .tabla-wrap{border:2px solid var(--borde); overflow:auto; width:100%; background:var(--panel); border-radius:var(--radio); box-shadow:var(--sombra)}
  table{border-collapse:collapse;width:100%;min-width:850px;table-layout:fixed}
  thead th{
    border-bottom:2px solid var(--borde);
    background:var(--tema-suave);
    height:27px;
    font-weight:bold;
    text-align:left;
    padding:2px 4px;
    white-space:nowrap;
  }
  tbody td{
    padding:2px 4px;
    height:var(--row-height);
    vertical-align:top;
    border-bottom:1px solid transparent;
  }
  tbody tr:hover{background:var(--fila-hover)}
  .col-inicio{width:105px}.col-vence{width:105px}.col-fin{width:105px}.col-cod{width:80px}.col-mas{width:34px;text-align:center}.col-estado{width:120px}.col-acciones{width:130px;text-align:right}.col-tarea{width:auto}
  .fecha-vacia{color:#999}
  .estado-pill{font-size:11px;white-space:nowrap}
  .estado-ok{color:#087c25}.estado-alerta{color:#d9002b}.estado-pend{color:#9a6200}
  .tarea-texto{display:flex;align-items:flex-start;gap:4px;word-break:break-word}
  .indent{display:inline-block;width:0}
  .cod{font-family:Consolas, 'Courier New', monospace}
  .resumen{margin-top:7px;font-size:11px;color:#333}
  .sin-resultados{text-align:center;color:#555;padding:22px!important;font-weight:bold}
  .filtro-activo{background:#e9f2ff!important;outline:2px solid var(--azul)}
  .filtro-activo-rojo{background:#ffe9ef!important;outline:2px solid var(--rojo)}
  .modal-fondo{
    display:none; position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:10; align-items:center; justify-content:center; padding:12px;
  }
  .modal{
    background:var(--panel); border:2px solid var(--borde); padding:12px; width:100%; max-width:430px; box-shadow:0 8px 24px rgba(0,0,0,.35);
  }
  .modal h2{font-size:16px;margin:0 0 10px}
  .campo{margin-bottom:8px}
  .campo label{display:block;font-weight:bold;margin-bottom:2px}
  .campo input,.campo textarea{width:100%;border:2px solid var(--borde);padding:5px;font-size:13px;font-family:Arial, Helvetica, sans-serif}
  .campo textarea{height:65px;resize:vertical}
  .modal-botones{display:flex;justify-content:flex-end;gap:8px;margin-top:10px}
  .json-panel{display:none;margin-top:8px;border:2px solid var(--borde);padding:8px;background:var(--panel);border-radius:var(--radio);box-shadow:var(--sombra)}
  .json-panel textarea{width:100%;height:90px;border:2px solid var(--borde);font-family:Consolas,'Courier New',monospace;font-size:11px;padding:5px}

  .ajustes-grid{display:grid;grid-template-columns:1fr;gap:10px}
  .grupo-ajuste{border:1px solid var(--borde);padding:8px;background:var(--tema-suave)}
  .grupo-ajuste strong{display:block;margin-bottom:6px}
  .opciones{display:flex;gap:6px;flex-wrap:wrap}
  .opcion-radio{display:inline-flex;align-items:center;gap:4px;border:1px solid var(--borde);background:var(--panel);padding:5px 7px;cursor:pointer;border-radius:var(--radio);box-shadow:var(--sombra)}
  .opcion-radio input{margin:0}
  .muestra-color{display:inline-block;width:14px;height:14px;border:1px solid #111;vertical-align:middle}
  .c-negro{background:#111}.c-azul{background:#006ce0}.c-verde{background:#14873d}.c-amarillo{background:#ffc533}.c-rojo{background:#d61535}

  @media(max-width:720px){
    body{padding:5px;font-size:11px}
    .barra-superior{grid-template-columns:1fr;gap:6px}
    .herramientas{justify-content:flex-start}
    .tabla-wrap{max-height:70vh}
  }
  @media print{
    body{background:#fff!important}
    *{box-shadow:none!important;border-radius:0!important}
    .herramientas,.modal-fondo,.json-panel,.btn-mini,.btn-accion{display:none!important}
    body{padding:0;font-size:12px}
    .app{max-width:none;width:100%}
    .tabla-wrap{border:1px solid #111;overflow:visible;width:100%}
    table{min-width:0;width:100%;font-size:10px;table-layout:auto}
    thead th, tbody td{padding:2px 3px}
    th:nth-child(1),td:nth-child(1),
    th:nth-child(2),td:nth-child(2),
    th:nth-child(3),td:nth-child(3){width:10ch;min-width:10ch;max-width:10ch;white-space:nowrap}
    th:nth-child(4),td:nth-child(4){width:1%;white-space:nowrap}
    th:nth-child(5),td:nth-child(5){width:auto;white-space:normal;word-break:break-word}
    th:nth-child(6),td:nth-child(6),
    th:nth-child(8),td:nth-child(8){display:none!important}
    th:nth-child(7),td:nth-child(7){width:9ch;min-width:9ch;white-space:nowrap;text-align:right}
    .tarea-texto{display:block;word-break:break-word}
  }
</style>
</head>
<body>
<div class="app">
  <div class="barra-superior">
    <div class="filtro-box">
      <div class="bloque-titulo">FILTRO</div>
      <div class="filtro-dias-linea">
        <span class="filtro-dias-label">Faltan menos de</span>
        <input id="diasFiltro" type="number" min="0" step="1" value="" title="Días restantes hasta el vencimiento">
        <strong>días</strong>
      </div>
    </div>
    <div class="busqueda-box">
      <div class="bloque-titulo">BÚSQUEDA</div>
      <input id="busqueda" type="text" placeholder="">
    </div>
  </div>

  <div class="herramientas">
    <button id="btnLimpiar">Limpiar filtros</button>
    <button id="btnJson">Copiar/Pegar JSON</button>
    <button onclick="window.print()">Imprimir</button>
    <button id="btnAjustes">Ajustes</button>
  </div>

  <div class="json-panel" id="jsonPanel">
    <div style="margin-bottom:5px;font-weight:bold">Copia de seguridad JSON</div>
    <textarea id="jsonTexto"></textarea>
    <div class="herramientas" style="justify-content:flex-start;margin-bottom:0">
      <button id="btnCopiarJson">Copiar JSON actual</button>
      <button id="btnRestaurarJson">Restaurar desde texto pegado</button>
      <button id="btnCerrarJson">Cerrar</button>
    </div>
  </div>

  <div class="tabla-wrap">
    <table>
      <thead>
        <tr>
          <th class="col-inicio"><button class="btn-mini btn-azul" data-filter="inicio" data-value="azul" title="Mostrar iniciadas">✓</button><button class="btn-mini btn-rojo" data-filter="inicio" data-value="rojo" title="Mostrar sin iniciar">✕</button> INICIO</th>
          <th class="col-vence"><button class="btn-mini btn-azul" data-filter="vence" data-value="azul" title="Mostrar dentro de plazo">✓</button><button class="btn-mini btn-rojo" data-filter="vence" data-value="rojo" title="Mostrar vencidas">✕</button> VENCE</th>
          <th class="col-fin"><button class="btn-mini btn-azul" data-filter="fin" data-value="azul" title="Mostrar finalizadas">✓</button><button class="btn-mini btn-rojo" data-filter="fin" data-value="rojo" title="Mostrar pendientes">✕</button> FIN</th>
          <th class="col-cod">COD</th>
          <th class="col-tarea">TAREA</th>
          <th class="col-mas"><button class="btn-mini btn-add" id="btnNueva" title="Añadir nueva tarea">+</button></th>
          <th class="col-estado">ESTADO</th>
          <th class="col-acciones">ACCIONES</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <div class="resumen" id="resumen"></div>
</div>

<div class="modal-fondo" id="modalFondo">
  <div class="modal">
    <h2 id="modalTitulo">Nueva tarea</h2>
    <div class="campo"><label for="mInicio">Inicio</label><input id="mInicio" type="date"></div>
    <div class="campo"><label for="mVence">Vence</label><input id="mVence" type="date"></div>
    <div class="campo"><label for="mFin">Fin</label><input id="mFin" type="date"></div>
    <div class="campo"><label for="mTexto">Tarea</label><textarea id="mTexto"></textarea></div>
    <div class="modal-botones">
      <button id="mCancelar">Cancelar</button>
      <button id="mGuardar"><strong>Guardar</strong></button>
    </div>
  </div>
</div>


<div class="modal-fondo" id="ajustesFondo">
  <div class="modal">
    <h2>Ajustes de apariencia</h2>
    <div class="ajustes-grid">
      <div class="grupo-ajuste">
        <strong>1. Apariencia de botones e inputs</strong>
        <div class="opciones">
          <label class="opcion-radio"><input type="radio" name="modoVisual" value="2d"> 2D plano</label>
          <label class="opcion-radio"><input type="radio" name="modoVisual" value="3d"> 3D con relieve</label>
        </div>
      </div>
      <div class="grupo-ajuste">
        <strong>2. Color del tema</strong>
        <div class="opciones">
          <label class="opcion-radio"><input type="radio" name="temaColor" value="negro"><span class="muestra-color c-negro"></span> Negro</label>
          <label class="opcion-radio"><input type="radio" name="temaColor" value="azul"><span class="muestra-color c-azul"></span> Azul</label>
          <label class="opcion-radio"><input type="radio" name="temaColor" value="verde"><span class="muestra-color c-verde"></span> Verde</label>
          <label class="opcion-radio"><input type="radio" name="temaColor" value="amarillo"><span class="muestra-color c-amarillo"></span> Amarillo</label>
          <label class="opcion-radio"><input type="radio" name="temaColor" value="rojo"><span class="muestra-color c-rojo"></span> Rojo</label>
        </div>
      </div>
      <div class="grupo-ajuste">
        <strong>3. Tamaño visual de la tabla</strong>
        <div class="opciones">
          <label class="opcion-radio"><input type="radio" name="densidadVisual" value="compacta"> Compacta</label>
          <label class="opcion-radio"><input type="radio" name="densidadVisual" value="normal"> Normal</label>
          <label class="opcion-radio"><input type="radio" name="densidadVisual" value="grande"> Grande</label>
        </div>
      </div>
    </div>
    <div class="modal-botones">
      <button id="btnAjustesDefecto">Valores por defecto</button>
      <button id="btnCerrarAjustes"><strong>Cerrar</strong></button>
    </div>
  </div>
</div>

<script>
(function(){
'use strict';
var STORAGE_KEY='notas_tareas_limpia_v1';
var SETTINGS_KEY='notas_tareas_ajustes_v1';
var ajustes={modo:'2d',tema:'negro',densidad:'normal'};
var tasks=[];
var filters={inicio:null, vence:null, fin:null};
var editing={mode:'new', id:null, parentId:null};

var $=function(id){return document.getElementById(id)};
function todayISO(){var d=new Date(); d.setHours(0,0,0,0); return d.toISOString().slice(0,10)}
function parseDate(s){if(!s)return null; var p=s.split('-'); if(p.length!==3)return null; return new Date(+p[0],+p[1]-1,+p[2]);}
function fmt(s){if(!s)return '<span class="fecha-vacia">-</span>'; var p=s.split('-'); return p[2]+'/'+p[1]+'/'+p[0];}
function uid(){return 't'+Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function esc(s){return String(s||'').replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]})}

function loadSettings(){
  try{ajustes=Object.assign(ajustes,JSON.parse(localStorage.getItem(SETTINGS_KEY)||'{}')||{});}catch(e){}
  applySettings();
}
function saveSettings(){localStorage.setItem(SETTINGS_KEY,JSON.stringify(ajustes));}
function applySettings(){
  document.body.classList.remove('modo-2d','modo-3d','tema-negro','tema-azul','tema-verde','tema-amarillo','tema-rojo','densidad-compacta','densidad-normal','densidad-grande');
  document.body.classList.add('modo-'+ajustes.modo,'tema-'+ajustes.tema,'densidad-'+ajustes.densidad);
  Array.prototype.forEach.call(document.querySelectorAll('input[name="modoVisual"]'),function(i){i.checked=i.value===ajustes.modo});
  Array.prototype.forEach.call(document.querySelectorAll('input[name="temaColor"]'),function(i){i.checked=i.value===ajustes.tema});
  Array.prototype.forEach.call(document.querySelectorAll('input[name="densidadVisual"]'),function(i){i.checked=i.value===ajustes.densidad});
}
function resetSettings(){ajustes={modo:'2d',tema:'negro',densidad:'normal'};saveSettings();applySettings();}

function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(tasks));}
function load(){
  try{tasks=JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]')||[]}catch(e){tasks=[]}
  if(tasks.length===0){
    tasks=[
      {id:uid(),inicio:'2026-04-01',vence:'2026-05-01',fin:'2026-04-20',texto:'Desatascar pocillo patio',children:[]},
      {id:uid(),inicio:'2026-03-04',vence:'2026-03-15',fin:'',texto:'Llamar a yoigo',children:[]},
      {id:uid(),inicio:'2026-01-24',vence:'2026-07-03',fin:'',texto:'Regalo boda Daniel',children:[]}
    ];
    save();
  }
}
function allItems(list, out){out=out||[]; list.forEach(function(t){out.push(t); allItems(t.children||[],out)}); return out;}
function findWithParent(id, list, parent){
  list=list||tasks;
  for(var i=0;i<list.length;i++){
    if(list[i].id===id)return {item:list[i], list:list, parent:parent||null, index:i};
    var r=findWithParent(id,list[i].children||[],list[i]); if(r)return r;
  }
  return null;
}
function codeFor(path){return path.map(function(n){return String(n+1).padStart(2,'0')}).join('.').replace(/^0/,'000');}
function isStarted(t){return !!t.inicio;}
function isFinished(t){return !!t.fin;}
function isExpired(t){
  if(!t.vence || t.fin)return false;
  var v=parseDate(t.vence), h=parseDate(todayISO());
  return v && v<h;
}
function isWithinDays(t, days){
  if(days==='' || days===null || isNaN(days))return true;
  if(!t.vence || t.fin)return false;
  var v=parseDate(t.vence), h=parseDate(todayISO());
  if(!v)return false;
  var diff=Math.ceil((v-h)/86400000);
  return diff>=0 && diff<=Number(days);
}
function matchesState(t){
  if(filters.inicio==='azul' && !isStarted(t))return false;
  if(filters.inicio==='rojo' && isStarted(t))return false;
  if(filters.vence==='azul' && isExpired(t))return false;
  if(filters.vence==='rojo' && !isExpired(t))return false;
  if(filters.fin==='azul' && !isFinished(t))return false;
  if(filters.fin==='rojo' && isFinished(t))return false;
  return true;
}
function textBlob(t, code){
  var s=[code,t.texto,t.inicio,t.vence,t.fin].join(' ').toLowerCase();
  (t.children||[]).forEach(function(c,i){s+=' '+textBlob(c,code+'.'+(i+1));});
  return s;
}
function itemOwnText(t, code){return [code,t.texto,t.inicio,t.vence,t.fin].join(' ').toLowerCase();}
function getStatus(t){
  if(isFinished(t))return '<span class="estado-pill estado-ok">Finalizada</span>';
  if(isExpired(t))return '<span class="estado-pill estado-alerta">Vencida</span>';
  if(isStarted(t))return '<span class="estado-pill estado-pend">Iniciada</span>';
  return '<span class="estado-pill">Sin iniciar</span>';
}
function passes(t, path){
  var days=$('diasFiltro').value;
  var q=$('busqueda').value.trim().toLowerCase();
  var code=codeFor(path);
  var stateOk=matchesState(t);
  var daysOk=isWithinDays(t,days);
  var textOk=!q || textBlob(t,code).indexOf(q)>=0;
  return stateOk && daysOk && textOk;
}
function renderList(list, level, path, rows){
  list.forEach(function(t,idx){
    var p=path.concat(idx);
    var children=t.children||[];
    var childRows=[];
    renderList(children,level+1,p,childRows);
    var showSelf=passes(t,p) || childRows.length>0;
    if(showSelf){
      var code=codeFor(p);
      rows.push('<tr data-id="'+t.id+'">'+
        '<td>'+fmt(t.inicio)+'</td>'+
        '<td>'+fmt(t.vence)+'</td>'+
        '<td>'+fmt(t.fin)+'</td>'+
        '<td class="cod">'+esc(code)+'</td>'+
        '<td><div class="tarea-texto"><span style="display:inline-block;width:'+(level*22)+'px"></span><span>'+(level>0?'↳ ':'')+esc(t.texto)+'</span></div></td>'+ 
        '<td class="col-mas"><button class="btn-mini btn-sub btn-accion" data-act="addSub" data-id="'+t.id+'" title="Añadir subtarea">＋</button></td>'+
        '<td>'+getStatus(t)+'</td>'+
        '<td class="col-acciones">'+
          '<button class="btn-mini btn-sub btn-accion" data-act="addSub" data-id="'+t.id+'" title="Añadir subtarea">＋</button>'+
          '<button class="btn-mini btn-edit btn-accion" data-act="edit" data-id="'+t.id+'" title="Editar">✎</button>'+
          '<button class="btn-mini btn-del btn-accion" data-act="del" data-id="'+t.id+'" title="Eliminar">🗑</button>'+
        '</td></tr>');
      rows.push.apply(rows,childRows);
    }
  });
}
function render(){
  var rows=[]; renderList(tasks,0,[],rows);
  $('tbody').innerHTML=rows.length?rows.join(''):'<tr><td colspan="8" class="sin-resultados">No hay tareas que coincidan con los filtros actuales.</td></tr>';
  updateFilterButtons();
  var all=allItems(tasks,[]);
  var iniciadas=all.filter(isStarted).length;
  var pendientes=all.filter(function(t){return !isFinished(t)}).length;
  var finalizadas=all.filter(isFinished).length;
  var vencidas=all.filter(isExpired).length;
  $('resumen').innerHTML='Total: '+all.length+' &nbsp; Visibles: '+rows.length+' &nbsp; Iniciadas: '+iniciadas+' &nbsp; Pendientes: '+pendientes+' &nbsp; Finalizadas: '+finalizadas+' &nbsp; Vencidas: <span style="color:#ff1744;font-weight:bold">'+vencidas+'</span>';
}
function updateFilterButtons(){
  Array.prototype.forEach.call(document.querySelectorAll('[data-filter]'),function(b){
    b.classList.remove('filtro-activo','filtro-activo-rojo');
    if(filters[b.getAttribute('data-filter')]===b.getAttribute('data-value')){
      b.classList.add(b.getAttribute('data-value')==='rojo'?'filtro-activo-rojo':'filtro-activo');
    }
  });
}
function openModal(mode,id,parentId){
  editing={mode:mode,id:id||null,parentId:parentId||null};
  var t=id?findWithParent(id).item:{inicio:'',vence:'',fin:'',texto:''};
  $('modalTitulo').textContent=mode==='edit'?'Editar tarea':(mode==='sub'?'Nueva subtarea':'Nueva tarea');
  $('mInicio').value=t.inicio||''; $('mVence').value=t.vence||''; $('mFin').value=t.fin||''; $('mTexto').value=t.texto||'';
  $('modalFondo').style.display='flex'; setTimeout(function(){$('mTexto').focus()},50);
}
function closeModal(){$('modalFondo').style.display='none';}
function modalSave(){
  var texto=$('mTexto').value.trim();
  if(!texto){alert('Escribe el texto de la tarea.');return;}
  var data={inicio:$('mInicio').value,vence:$('mVence').value,fin:$('mFin').value,texto:texto};
  if(editing.mode==='edit'){
    var r=findWithParent(editing.id); if(!r)return;
    r.item.inicio=data.inicio; r.item.vence=data.vence; r.item.fin=data.fin; r.item.texto=data.texto;
  }else{
    var nuevo={id:uid(),inicio:data.inicio,vence:data.vence,fin:data.fin,texto:data.texto,children:[]};
    if(editing.mode==='sub'){
      var p=findWithParent(editing.parentId); if(!p)return;
      p.item.children=p.item.children||[]; p.item.children.push(nuevo);
    }else tasks.push(nuevo);
  }
  save(); closeModal(); render();
}
function delItem(id){
  var r=findWithParent(id); if(!r)return;
  if(!confirm('¿Eliminar esta tarea y todas sus subtareas?'))return;
  r.list.splice(r.index,1); save(); render();
}
function setup(){
  loadSettings();
  load(); render();
  $('diasFiltro').addEventListener('input',render);
  $('busqueda').addEventListener('input',render);
  $('btnNueva').addEventListener('click',function(){openModal('new')});
  $('mCancelar').addEventListener('click',closeModal);
  $('mGuardar').addEventListener('click',modalSave);
  $('modalFondo').addEventListener('click',function(e){if(e.target===$('modalFondo'))closeModal();});
  $('btnLimpiar').addEventListener('click',function(){$('diasFiltro').value='';$('busqueda').value='';filters={inicio:null,vence:null,fin:null};render();});
  Array.prototype.forEach.call(document.querySelectorAll('[data-filter]'),function(b){
    b.addEventListener('click',function(){
      var f=b.getAttribute('data-filter'), v=b.getAttribute('data-value');
      filters[f]=(filters[f]===v)?null:v; render();
    });
  });
  $('tbody').addEventListener('click',function(e){
    var b=e.target.closest('button'); if(!b)return;
    var act=b.getAttribute('data-act'), id=b.getAttribute('data-id');
    if(act==='addSub')openModal('sub',null,id);
    if(act==='edit')openModal('edit',id);
    if(act==='del')delItem(id);
  });
  $('btnJson').addEventListener('click',function(){var p=$('jsonPanel');p.style.display=p.style.display==='block'?'none':'block';$('jsonTexto').value=JSON.stringify(tasks,null,2);});
  $('btnAjustes').addEventListener('click',function(){applySettings();$('ajustesFondo').style.display='flex';});
  $('btnCerrarAjustes').addEventListener('click',function(){$('ajustesFondo').style.display='none';});
  $('btnAjustesDefecto').addEventListener('click',resetSettings);
  $('ajustesFondo').addEventListener('click',function(e){if(e.target===$('ajustesFondo'))$('ajustesFondo').style.display='none';});
  Array.prototype.forEach.call(document.querySelectorAll('input[name="modoVisual"]'),function(i){i.addEventListener('change',function(){ajustes.modo=this.value;saveSettings();applySettings();});});
  Array.prototype.forEach.call(document.querySelectorAll('input[name="temaColor"]'),function(i){i.addEventListener('change',function(){ajustes.tema=this.value;saveSettings();applySettings();});});
  Array.prototype.forEach.call(document.querySelectorAll('input[name="densidadVisual"]'),function(i){i.addEventListener('change',function(){ajustes.densidad=this.value;saveSettings();applySettings();});});
  $('btnCerrarJson').addEventListener('click',function(){$('jsonPanel').style.display='none';});
  $('btnCopiarJson').addEventListener('click',function(){var txt=JSON.stringify(tasks,null,2);$('jsonTexto').value=txt;$('jsonTexto').select();document.execCommand('copy');alert('JSON copiado.');});
  $('btnRestaurarJson').addEventListener('click',function(){
    try{var data=JSON.parse($('jsonTexto').value); if(!Array.isArray(data))throw new Error('Formato no válido'); tasks=data; save(); render(); alert('Datos restaurados.');}
    catch(e){alert('No se ha podido restaurar. Revisa el JSON.');}
  });
}
setup();
})();
</script>
</body>
</html>
